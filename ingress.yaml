apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: covoiturage-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: covoiturage.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: covoiturage-service
            port:
              number: 80